name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          name="w2g-${{ matrix.goos }}-${{ matrix.goarch }}"
          [ "${{ matrix.goos }}" = windows ] && name="$name.exe"
          go build -trimpath \
            -ldflags "-s -w -X w2g-cli/internal/cli.version=${GITHUB_REF_NAME}" \
            -o "$name" .
          echo "ASSET=$name" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: w2g-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: w2g-*
          merge-multiple: true
          path: dist

      - name: Checksums
        run: cd dist && sha256sum * > SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
